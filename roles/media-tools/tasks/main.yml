---
- name: media-tools | install distro media packages (Arch)
  ansible.builtin.import_tasks: arch.yml
  when: facts_is_arch
  tags:
    - media-tools
    - ffmpeg
    - libvips
    - packages

- name: media-tools | install distro media packages (Ubuntu)
  ansible.builtin.import_tasks: ubuntu.yml
  when: facts_is_ubuntu
  tags:
    - media-tools
    - ffmpeg
    - libvips
    - packages

- name: media-tools | fail for unsupported distro
  ansible.builtin.fail:
    msg: "media-tools supports Arch Linux and Ubuntu only."
  when: not facts_is_arch and not facts_is_ubuntu
  tags:
    - media-tools
    - ffmpeg
    - libvips
    - yt-dlp
    - packages

- name: media-tools | install yt-dlp binary
  ansible.builtin.import_tasks: yt-dlp.yml
  when: facts_is_arch or facts_is_ubuntu
  tags:
    - media-tools
    - yt-dlp
    - packages
