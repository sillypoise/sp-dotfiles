---
- name: media-tools | select yt-dlp asset for architecture
  ansible.builtin.set_fact:
    media_tools_yt_dlp_asset: >-
      {{
        'yt-dlp_linux_aarch64'
        if ansible_architecture in ['aarch64', 'arm64']
        else 'yt-dlp_linux'
        if ansible_architecture in ['x86_64', 'amd64']
        else ''
      }}
  tags:
    - media-tools
    - yt-dlp
    - packages

- name: media-tools | fail when architecture is unsupported for yt-dlp
  ansible.builtin.fail:
    msg: "Unsupported architecture for yt-dlp binary install: {{ ansible_architecture }}"
  when: media_tools_yt_dlp_asset | length == 0
  tags:
    - media-tools
    - yt-dlp
    - packages

- name: media-tools | fetch yt-dlp release metadata
  ansible.builtin.uri:
    url: "https://api.github.com/repos/yt-dlp/yt-dlp/releases/tags/{{ media_tools_yt_dlp_version }}"
    return_content: true
    status_code: 200
  register: media_tools_yt_dlp_release
  changed_when: false
  retries: 3
  delay: 2
  until: media_tools_yt_dlp_release is succeeded
  tags:
    - media-tools
    - yt-dlp
    - packages

- name: media-tools | select yt-dlp release asset metadata
  ansible.builtin.set_fact:
    media_tools_yt_dlp_asset_info: >-
      {{
        (
          media_tools_yt_dlp_release.json.assets
          | selectattr('name', 'equalto', media_tools_yt_dlp_asset)
          | list
          | first
          | default({})
        )
      }}
  tags:
    - media-tools
    - yt-dlp
    - packages

- name: media-tools | extract yt-dlp asset url and digest
  ansible.builtin.set_fact:
    media_tools_yt_dlp_download_url: "{{ media_tools_yt_dlp_asset_info.browser_download_url | default('') }}"
    media_tools_yt_dlp_sha256: >-
      {{
        (media_tools_yt_dlp_asset_info.digest | default(''))
        | regex_replace('^sha256:', '')
      }}
  tags:
    - media-tools
    - yt-dlp
    - packages

- name: media-tools | fail when yt-dlp release asset metadata is missing
  ansible.builtin.fail:
    msg: "Unable to resolve metadata for asset {{ media_tools_yt_dlp_asset }} in yt-dlp release {{ media_tools_yt_dlp_version }}"
  when: media_tools_yt_dlp_download_url | length == 0
  tags:
    - media-tools
    - yt-dlp
    - packages

- name: media-tools | fail when yt-dlp digest is invalid
  ansible.builtin.fail:
    msg: "Invalid sha256 digest for {{ media_tools_yt_dlp_asset }} in release metadata"
  when: not (media_tools_yt_dlp_sha256 is match('^[A-Fa-f0-9]{64}$'))
  tags:
    - media-tools
    - yt-dlp
    - packages

- name: media-tools | ensure /usr/local/bin exists
  ansible.builtin.file:
    path: /usr/local/bin
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - media-tools
    - yt-dlp
    - packages

- name: media-tools | install yt-dlp binary with checksum verification
  ansible.builtin.get_url:
    url: "{{ media_tools_yt_dlp_download_url }}"
    dest: /usr/local/bin/yt-dlp
    owner: root
    group: root
    mode: "0755"
    checksum: "sha256:{{ media_tools_yt_dlp_sha256 }}"
  register: media_tools_yt_dlp_download
  retries: 3
  delay: 2
  until: media_tools_yt_dlp_download is succeeded
  tags:
    - media-tools
    - yt-dlp
    - packages

- name: media-tools | verify yt-dlp executable
  ansible.builtin.command:
    cmd: /usr/local/bin/yt-dlp --version
  changed_when: false
  tags:
    - media-tools
    - yt-dlp
    - verification
