default_roles:
  - users
  - bash
  - zsh
  - nix
  - media-tools
  - volta
  - git
  - ssh
  - openssh
  - ufw
  - tailscale
  - c
  - btop
  - nvim
  - opencode
  - pi
  - zellij
  # - test

exclude_roles:
  - bootstrap

# Default values for system facts
facts_op_installed: false
facts_nix_installed: false
facts_home_manager_installed: false
facts_zsh_installed: false
facts_tailscale_installed: false
facts_tailscale_authed: false
tailscale_accept_dns: true

# Nix/Home Manager releases
nixpkgs_release: "nixos-25.11"
home_manager_release: "release-25.11"

# Media tools releases
media_tools_yt_dlp_version: "2026.02.21"

# Pi defaults
pi_default_provider: "openai-codex"
pi_default_model: "gpt-5.5"
pi_default_thinking_level: "low"
# Keep Ctrl+P model cycling short and predictable across hosts.
pi_enabled_models:
  - "openai-codex/gpt-5.5"
  - "openai-codex/gpt-5.4"
  - "kimi-for-coding"
#   - "claude-sonnet-4.5"
#   - "gemini-2.5-pro"
pi_guides_enable_global: true
pi_guides_source: "git:git@github.com:sillypoise/pi-guides@v0.5.1"
pi_extra_packages: []
pi_managed_source_packages:
  - name: "fff.nvim"
    repo: "https://github.com/dmtrKovalenko/fff.nvim.git"
    ref: "4b13a91aa57c5e9ed32ee381d9ee521800818370"
    checkout_path: "{{ host_user_home }}/.pi/agent/src/fff.nvim"
    package_path: "{{ host_user_home }}/.pi/agent/src/fff.nvim/packages/pi-fff"
    dependency_marker: "node_modules/@ff-labs/fff-node/package.json"
    install_command: "npm install --omit=dev"
pi_keybindings:
  app.interrupt:
    - ctrl+x
  app.model.cycleForward: []
  app.session.toggleNamedFilter: []
  app.session.togglePath: []
  tui.editor.cursorDown:
    - down
  tui.editor.cursorUp:
    - up
  tui.editor.pageDown:
    - pageDown
    - ctrl+down
  tui.editor.pageUp:
    - pageUp
    - ctrl+up
  tui.select.down:
    - down
    - ctrl+n
  tui.select.up:
    - up
    - ctrl+p

# Base package lists by distro
packages_common:
  - git
  - curl
  - unzip

packages_arch:
  - python
  - python-pip
  - openssh

packages_ubuntu:
  - python3
  - python3-pip
  - openssh-client
  - openssh-server

# Users facts
facts_sillypoise_exists: false
facts_flubber_exists: false
facts_password_setup_complete: false

# Define usernames
host_user: "sillypoise"
automated_user: "flubber"
gh_user: "sillypoise"

# OpenCode guides source-of-truth repo
opencode_guides_repo: "sillypoise/sp-opencode-guides"
opencode_guides_ref: "v0.5.0"
opencode_guides_clone_path: "{{ host_user_home }}/.local/share/opencode-guides"

# System identity
system_hostname: "sp-dev"

# Define home directories based on usernames, with fallback for host_user
host_user_home: "/home/{{ host_user  }}"
automated_user_home: "/home/{{ automated_user }}"

# Define configs

facts_bash_config_installed: false
facts_zsh_config_installed: false
